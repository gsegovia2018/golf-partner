name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci

      - name: Lint
        # Blocking: the config is committed and `npm run lint` is error-free.
        # Remaining items are warnings (tracked, non-blocking) — see eslint.config.mjs.
        run: npm run lint
