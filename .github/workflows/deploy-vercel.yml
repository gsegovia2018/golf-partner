name: Deploy to Vercel

on:
  push:
    branches: [master]

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            echo "VERCEL_DEPLOY_HOOK secret not set" >&2
            exit 1
          fi
          curl -sf -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
